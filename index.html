<!DOCTYPE html>
<html lang="hi">
<head>

    <title>Akshara Alchemist - Complete 139</title>
    <style>
        :root { --bg: #0f172a; --blue: #38bdf8; --gold: #fbbf24; --white: #f1f5f9; --green: #4ade80; --red: #ef4444; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; } 
        
        body { 
            height: 100vh; margin: 0; overflow: hidden; background: var(--bg); color: var(--white);
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 420px; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        header { text-align: center; height: 12%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .dashboard { display: flex; justify-content: space-around; align-items: center; margin-top: 5px; }
        .timer { font-family: monospace; font-size: 1.2rem; color: var(--gold); font-weight: bold; }
        .score-box { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--blue); padding: 4px 12px; border-radius: 20px; font-weight: bold; color: var(--green); font-size: 0.9rem; }
        
        #goal-area { text-align: center; height: 12%; display: flex; align-items: center; justify-content: center; }
        #target-text { color: var(--gold); font-size: 2.2rem; font-weight: bold; border-bottom: 3px solid #334155; }

        .game-grid { display: grid; grid-template-columns: 80px 1fr 80px; gap: 10px; height: 50%; align-items: center; }
        .bank { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--blue); border-radius: 12px;
            height: 95%; display: flex; flex-direction: column; align-items: center; padding: 5px; gap: 8px; overflow-y: auto;
        }
        .bank h3 { font-size: 0.6rem; margin: 2px; color: var(--blue); }

        .forge-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #forge-circle {
            width: 110px; height: 110px; border: 4px dashed var(--gold); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 3rem;
            background: rgba(251,191,36,0.05); transition: all 0.2s;
        }

        .shake { animation: shake 0.4s; border-color: var(--red) !important; background: rgba(239, 68, 68, 0.2) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .tile {
            width: 60px; height: 60px; background: white; color: #1e293b; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold;
            box-shadow: 0 4px 0 #94a3b8; flex-shrink: 0; cursor: grab;
        }
        .tile:active { cursor: grabbing; }
        .tile.m { background: var(--gold); box-shadow: 0 4px 0 #b45309; }

        #msg { font-size: 0.8rem; color: var(--green); margin-top: 10px; height: 15px; font-weight: bold; text-align: center; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .action-btn { padding: 8px 15px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        #skip-btn { background: #334155; color: white; }
        #next-btn { background: var(--green); color: #0f172a; }
        .hidden { display: none !important; }
        
        #tray-area { height: 15%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-tray { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;}
        .slot { width: 60px; height: 60px; border: 2px dashed #475569; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; background: rgba(0,0,0,0.2); }
    </style>
</head>

        {w:"फूल गोभी", p:["फू","ल","गो","भी"], v:["फ","ल","ग","भ"], m:["ू","ो"]},
        {w:"बंद गोभी", p:["बं","द","गो","भी"], v:["ब","द","ग","भ"], m:["ं","ो"]},
        {w:"सहजन", p:["स","ह","ज","न"], v:["स","ह","ज","न","ल"], m:["ा","े"]},
        {w:"गाजर", p:["गा","ज","र"], v:["ग","ज","र","ल"], m:["ा","े"]},
        {w:"पालक", p:["पा","ल","क"], v:["प","ल","क","म"], m:["ा","े"]},
        {w:"चौलाई", p:["चौ","ला","ई"], v:["च","ल","ई","म"], m:["ौ","ा"]},
        {w:"हरी धनिया", p:["ह","री","ध","नि","या"], v:["ह","र","ध","न","य"], m:["ी","ि"]},
        {w:"मीठा नीम", p:["मी","ठा","नी","म"], v:["म","ठ","न","ल"], m:["ी","ा"]},
        {w:"लहसुन", p:["ल","ह","सु","न"], v:["ल","ह","स","न"], m:["ु","ू"]},
        {w:"कुम्हड़ा", p:["कु","म्ह","ड़ा"], v:["क","म्ह","ड़","ल"], m:["ु","ा"]},
        {w:"इमली", p:["इ","म","ली"], v:["इ","म","ल","क"], m:["ी","ि"]},
        {w:"गुलाब", p:["गु","ला","ब"], v:["ग","ल","ब","च"], m:["ु","ा"]},
        {w:"कमल", p:["क","म","ल"], v:["क","म","ल","न"], m:["ा","े"]},
        {w:"केवड़ा", p:["के","व","ड़ा"], v:["क","व","ड़","ल"], m:["े","ा"]},
        {w:"चमेली", p:["च","मे","ली"], v:["च","म","ल","न"], m:["े","ी"]},
        {w:"चंपा", p:["चं","पा"], v:["च","प","ल"], m:["ं","ा"]},
        {w:"जूही", p:["जू","ही"], v:["ज","ह","ल"], m:["ू","ी"]},
        {w:"गुड़हल", p:["गु","ड़","ह","ल"], v:["ग","ड़","ह","ल"], m:["ु","ू"]},
        {w:"गेंदा", p:["गें","दा"], v:["ग","द","ल"], m:["ें","ा"]},
        {w:"पारिजात", p:["पा","रि","जा","त"], v:["प","र","ज","त"], m:["ा","ि"]},
        {w:"सूरज मुखी", p:["सू","र","ज","मु","खी"], v:["स","र","ज","म","ख"], m:["ू","ु"]}
    ];

    function start() {
        idx = 0; 
        currentScore = 0; 
        const lvl = document.getElementById('lvl').value;
        pointsPerWord = (lvl == "1") ? 1 : 2;
        
        currentList = shuffle([...(lvl == "1" ? l1Data : l2Data)]);
        maxPoints = currentList.length * pointsPerWord;
        
        document.getElementById('pts-scored').innerText = currentScore;
        document.getElementById('pts-total').innerText = maxPoints;

        if(clockInterval) clearInterval(clockInterval);
        timer = 0; 
        clockInterval = setInterval(() => {
            timer++; let m = Math.floor(timer/60).toString().padStart(2,'0');
            let s = (timer%60).toString().padStart(2,'0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }, 1000);
        load();
    }

    function load() {
        const lvl = document.getElementById('lvl').value;
        const d = currentList[idx]; 
        
        document.getElementById('target-text').innerText = (lvl == "1") ? d.t : d.w;
        
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('skip-btn').classList.remove('hidden');
        document.getElementById('msg').innerText = "Drag a Vyanjan";
        bridge.v = ""; bridge.m = "";
        document.getElementById('forge-circle').innerText = "?";
        
        document.getElementById('v-bank').innerHTML = "<h3>VYANJAN</h3>";
        d.v.forEach(v => document.getElementById('v-bank').innerHTML += `<div class="tile" draggable="true" ondragstart="hDS(event, '${v}','v')">${v}</div>`);
        
        document.getElementById('m-bank').innerHTML = "<h3>MATRA</h3>";
        d.m.forEach(m => document.getElementById('m-bank').innerHTML += `<div class="tile m" draggable="true" ondragstart="hDS(event, '${m}','m')">${m}</div>`);
        
        const trayA = document.getElementById('tray-area');
        if(lvl == "2") {
            trayA.classList.remove('hidden'); document.getElementById('word-tray').innerHTML = "";
            d.p.forEach(part => document.getElementById('word-tray').innerHTML += `<div class="slot" ondragover="allowDrop(event)" ondrop="hTD(event, '${part}')">?</div>`);
        } else trayA.classList.add('hidden');
    }

    function allowDrop(e) { e.preventDefault(); }

    function hDS(e, v, t) { 
        e.dataTransfer.setData('text/plain', v);
        bridge.dVal = v; 
        bridge.dType = t; 
    }
    
    function handleForgeDrag(e) { 
        e.dataTransfer.setData('text/plain', bridge.v + bridge.m);
        bridge.dVal = bridge.v + bridge.m; 
        bridge.dType = "f"; 
    }

    function handleDrop(e) {
        e.preventDefault(); const c = document.getElementById('forge-circle'); c.classList.remove('shake');
        if (bridge.dType === 'v') { bridge.v = bridge.dVal; bridge.m = ""; c.innerText = bridge.v; document.getElementById('msg').innerText = "Now add Matra"; }
        else if (bridge.dType === 'm' && bridge.v !== "") {
            bridge.m = bridge.dVal; c.innerText = bridge.v + bridge.m;
            if (document.getElementById('lvl').value == "1") {
                if (c.innerText === currentList[idx].t) victory(); 
                else triggerError(c, true);
            }
        }
    }

    function hTD(e, target) {
        e.preventDefault(); 
        const droppedText = bridge.dVal; 
        
        if (droppedText === target) {
            e.target.innerText = droppedText; 
            e.target.style.background = "rgba(74, 222, 128, 0.2)"; 
            e.target.style.borderColor = "var(--green)";
            
            bridge.v = ""; bridge.m = ""; document.getElementById('forge-circle').innerText = "?";
            document.getElementById('msg').innerText = "Drag a Vyanjan";
            
            const slots = [...document.querySelectorAll('.slot')];
            if (slots.every(s => s.innerText !== "?")) victory();
        } else { 
            triggerError(e.target, true); document.getElementById('msg').innerText = "Wrong part!"; 
        }
    }

    function triggerError(el, wipe) {
        playSound('error'); el.classList.add('shake');
        setTimeout(() => {
            el.classList.remove('shake');
            if(wipe) { 
                bridge.v = ""; bridge.m = ""; 
                document.getElementById('forge-circle').innerText = "?"; 
                document.getElementById('msg').innerText = "Failed!"; 
            }
        }, 400);
    }

    function victory() { 
        playSound('success'); 
        currentScore += pointsPerWord; 
        document.getElementById('pts-scored').innerText = currentScore;
        document.getElementById('msg').innerText = "Shabash!"; 
        document.getElementById('next-btn').classList.remove('hidden'); 
        document.getElementById('skip-btn').classList.add('hidden'); 
    }

    function skipChallenge() {
        idx++; 
        if(idx >= currentList.length) { alert(`Level Complete! Final Score: ${currentScore}/${maxPoints}`); start(); } 
        else load();
    }

    function moveNext() { 
        idx++; 
        if(idx >= currentList.length) { alert(`Level Complete! Final Score: ${currentScore}/${maxPoints}`); start(); } 
        else load(); 
    }
    
    start();
</script>
